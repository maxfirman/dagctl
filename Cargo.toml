[package]
name = "dagster-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
cynic = { version = "3", features = ["http-reqwest"] }
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
toml = "0.8"

[build-dependencies]
cynic-codegen = "3"
