name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dagctl
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            command: cargo
            archive: tar.gz
          - name: linux-arm64
            runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            command: cross
            archive: tar.gz
          - name: macos-amd64
            runner: macos-latest
            target: x86_64-apple-darwin
            command: cargo
            archive: tar.gz
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            command: cargo
            archive: tar.gz
          - name: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            command: cargo
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
          cargo update --workspace
          echo "Set Cargo.toml version to $VERSION"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.command == 'cross'
        run: cargo install cross --locked

      - name: Build
        run: ${{ matrix.command }} build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="${BINARY_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "$BINARY_NAME"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          ARCHIVE="${BINARY_NAME}-v${{ needs.version.outputs.version }}-${{ matrix.target }}.zip"
          7z a "$ARCHIVE" "./target/${{ matrix.target }}/release/${BINARY_NAME}.exe"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
